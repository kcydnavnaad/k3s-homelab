apiVersion: apps/v1
kind: Deployment
metadata:
  name: verfwinkel-vranken
  namespace: verfwinkel-vranken
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verfwinkel-vranken
  template:
    metadata:
      labels:
        app: verfwinkel-vranken
    spec:
      containers:
        - name: verfwinkel-vranken
          image: ghcr.io/kcydnavnaad/verfwinkel-vranken:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: verfwinkel-vranken
  namespace: verfwinkel-vranken
spec:
  type: LoadBalancer
  selector:
    app: verfwinkel-vranken
  ports:
    - port: 80
      targetPort: 80
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.156"
