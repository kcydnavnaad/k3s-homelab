apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://pajikos.github.io/home-assistant-helm-chart/
    chart: home-assistant
    targetRevision: 0.3.54
    helm:
      values: |
        persistence:
          enabled: true
          size: 5Gi
        service:
          type: LoadBalancer
          annotations:
            metallb.io/loadBalancerIPs: "192.168.1.153"
        hostNetwork: true
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
