apiVersion: apps/v1
kind: Deployment
metadata:
  name: teams-slack
  namespace: teams-slack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: teams-slack
  template:
    metadata:
      labels:
        app: teams-slack
    spec:
      containers:
        - name: teams-slack
          image: ghcr.io/kcydnavnaad/teams-slack:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: teams-slack
  namespace: teams-slack
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.157"
spec:
  type: LoadBalancer
  selector:
    app: teams-slack
  ports:
    - port: 80
      targetPort: 80
