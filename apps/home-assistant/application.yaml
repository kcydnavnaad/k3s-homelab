apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kcydnavnaad/k3s-homelab.git
    targetRevision: main
    path: apps/home-assistant
    helm:
      chart: home-assistant
      repoURL: http://pajikos.github.io/home-assistant-helm-chart/
      targetRevision: 0.3.54
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
